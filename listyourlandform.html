<div id="form-section">
    <h1>List Your Land</h1>
    
    <form action="#acknowledgement" method="get">
        <label for="title">Property Title:</label><br>
        <input type="text" id="title" name="title" required><br><br>

        <label for="price">Price (BWP):</label><br>
        <input type="number" id="price" name="price" required><br><br>

        <label for="size">Land Size (m²):</label><br>
        <input type="text" id="size" name="size" required><br><br>

        <label for="location">Location:</label><br>
        <input type="text" id="location" name="location" required><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" required></textarea><br><br>

        <label for="name">Your Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Your Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
    <input type="tel" required><br><br>

        <button type="submit">Submit Listing</button>
    </form>
</div>
